<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORACLE | DATA TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&display=swap');
        :root { --red: #F80000; --bg: #070707; --border: #1a1a1a; }
        body { 
            background: var(--bg); color: #ebeae8; font-family: 'JetBrains Mono', monospace; 
            background-image: radial-gradient(#151515 1px, transparent 1px); background-size: 20px 20px;
            margin: 0; height: 100vh; overflow: hidden;
        }
        .oracle-text { font-size: 24px; font-weight: 900; color: var(--red); letter-spacing: -1px; }
        .sidebar-item:hover { color: white; border-left: 2px solid var(--red); padding-left: 1rem; background: rgba(248,0,0,0.05); }
        #terminal-out { scrollbar-width: none; }
        #terminal-out::-webkit-scrollbar { display: none; }
        .scanline {
            width: 100%; height: 2px; position: absolute; background: linear-gradient(to bottom, transparent, rgba(248, 0, 0, 0.08), transparent);
            animation: scan 10s linear infinite; pointer-events: none;
        }
        @keyframes scan { from { top: 0; } to { top: 100%; } }
        input { background: transparent; border: none; outline: none; width: 100%; color: white; caret-color: var(--red); }
    </style>
</head>
<body class="flex flex-col border-t-2 border-[#F80000]">
    <header class="h-14 border-b border-[#1a1a1a] flex items-center px-6 justify-between bg-black/90">
        <div class="flex items-center gap-4">
            <div class="oracle-text">ORACLE</div>
            <div class="h-4 w-[1px] bg-zinc-800"></div>
            <div class="text-[10px] text-zinc-500 tracking-[0.3em]">DATA TERMINAL</div>
        </div>
        <div class="text-[10px] text-zinc-500 font-bold uppercase italic">System_Active // Toni_Stark</div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <aside class="w-56 border-r border-[#1a1a1a] p-6 flex flex-col gap-8 bg-black/20">
            <div>
                <div class="text-[9px] text-zinc-600 mb-6 tracking-widest italic uppercase">Main_Menu</div>
                <nav class="flex flex-col gap-4 text-[11px] text-zinc-500">
                    <div class="sidebar-item cursor-pointer transition-all flex items-center gap-2" onclick="processCommand('DATABASES')"><span>▶</span> DATABASES</div>
                    <div class="sidebar-item cursor-pointer transition-all flex items-center gap-2" onclick="processCommand('SECURITY')"><span>▶</span> SECURITY</div>
                    <div class="sidebar-item cursor-pointer transition-all flex items-center gap-2" onclick="processCommand('LOGS')"><span>▶</span> LOGS</div>
                    <div class="sidebar-item cursor-pointer transition-all flex items-center gap-2" onclick="processCommand('STATS')"><span>▶</span> STATS</div>
                </nav>
            </div>
        </aside>

        <main class="flex-1 flex flex-col p-8 relative">
            <div class="scanline"></div>
            <div id="terminal-out" class="flex-1 p-6 text-[13px] border border-[#1a1a1a] overflow-y-auto bg-black/40">
                <div class="text-zinc-600 italic mb-2">>>> INITIALIZING ORACLE_CORE...</div>
            </div>
            
            <div id="chart-container" class="hidden h-64 border border-[#1a1a1a] my-4 bg-black/80 p-4">
                <canvas id="expensesChart"></canvas>
            </div>

            <div class="h-14 border border-[#F80000] bg-black flex items-center px-6 mt-6">
                <span class="text-[#F80000] mr-4 font-black">SYS:~$</span>
                <input type="text" id="cmd-input" placeholder="ENTER_COMMAND..." autofocus autocomplete="off">
            </div>
        </main>
    </div>

    <script>
        const SUPABASE_URL = 'https://iivlxixcmlrqwdhewbuz.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_H_obrhzr2n6zhfq-sQUKKw_Adp37KL7';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        const input = document.getElementById('cmd-input');
        const output = document.getElementById('terminal-out');
        const chartContainer = document.getElementById('chart-container');
        let virtualDB = [];
        let myChart = null;

        function printToConsole(text, colorClass = 'text-zinc-400') {
            const line = document.createElement('div');
            line.className = `${colorClass} mb-2 flex gap-2`;
            line.innerHTML = `<span>></span> <span>${text}</span>`;
            output.appendChild(line);
            output.scrollTop = output.scrollHeight;
        }

        async function syncData() {
            printToConsole('SYNCING WITH CLOUD_DB...', 'text-zinc-600 italic');
            const { data, error } = await _supabase.from('oracle_expenses').select('*');
            if (!error && data) {
                virtualDB = data;
                printToConsole(`SYNC_COMPLETE: ${virtualDB.length} RECORDS LOADED.`, 'text-green-600 font-bold');
            }
        }

        async function processCommand(raw) {
            const full = raw.trim(); if(!full) return;
            const parts = full.split(' '); const cmd = parts[0].toUpperCase();
            
            printToConsole(`<span class="text-[#F80000] font-bold">AUTHENTICATION SUCCESSFUL.</span>`, 'block');
            printToConsole(`СИСТЕМА ГОТОВА К РАБОТЕ.`, 'text-zinc-200');

            if (cmd === 'STATS') {
                chartContainer.classList.remove('hidden');
                if (myChart) myChart.destroy();
                const summary = {};
                virtualDB.forEach(i => { const c = i.category || 'OTHER'; summary[c] = (summary[c] || 0) + (parseFloat(i.amount) || 0); });
                const ctx = document.getElementById('expensesChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: Object.keys(summary),
                        datasets: [{ data: Object.values(summary), backgroundColor: ['#F80000', '#22c55e', '#3b82f6', '#eab308'] }]
                    },
                    options: { maintainAspectRatio: false, plugins: { legend: { labels: { color: '#555', font: { size: 10 } } } } }
                });
            } else if (cmd === 'CLEAR') {
                output.innerHTML = ''; chartContainer.classList.add('hidden');
            } else if (cmd === 'DATABASES') {
                printToConsole('CONNECTED TO: oracle_expenses [SUPABASE_CLOUD]', 'text-cyan-600');
            } else if (cmd === 'SECURITY') {
                printToConsole('FIREWALL: ACTIVE | ENCRYPTION: AES-256', 'text-green-600');
            } else if (cmd === 'LOGS') {
                printToConsole('SESSION_START: ' + new Date().toLocaleString(), 'text-zinc-500');
            }
        }

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') { processCommand(input.value); input.value = ''; } });
        window.onload = syncData;
    </script>
</body>
</html>
