<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ORACLE DATA CONTROL</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ORACLE">
    <link rel="apple-touch-icon" href="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg">
    
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden bg-[#f0f0f0]"> 
    <header class="h-14 bg-[#314358] border-b border-[#243242] flex items-center justify-between px-4 md:px-8 z-50">
        <div class="flex items-center gap-4 md:gap-6">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" 
                 alt="ORACLE" 
                 style="filter: invert(12%) sepia(94%) saturate(7465%) hue-rotate(358deg) brightness(96%) contrast(118%);" 
                 class="h-5">
            <div class="h-6 w-[1px] bg-white/20"></div>
            <h1 class="text-white text-[10px] md:text-[12px] tracking-[0.3em] font-light uppercase opacity-60">Data Control System</h1>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[9px] text-white/50 uppercase tracking-widest">Operator</span>
                <span class="text-[11px] text-white font-bold">TONI_STARK</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        <aside class="hidden lg:flex w-64 border-r border-[#ccc] flex-col p-6 gap-8 bg-[#4a5a6a] z-40">
            <div class="space-y-6">
                <div class="italic text-white/40 font-bold">MAIN_OPERATIONS</div>
                <nav class="space-y-2 text-white/80">
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> SCAN</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> STATUS</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> DATABASES</div>
                </nav>
            </div>
        </aside>

        <section class="flex-1 flex flex-col p-4 md:p-8 relative min-w-0">
            <div id="terminal-out" class="flex-1 bg-white border border-[#ccc] p-4 md:p-6 mono text-[12px] md:text-[13px] text-[#333] overflow-y-auto relative shadow-sm">
                <div class="scanline" style="background: linear-gradient(to bottom, transparent, rgba(0,0,0,0.03), transparent);"></div>
                <p class="text-zinc-400 mb-4 tracking-widest text-[9px] md:text-[10px]">>>> INITIALIZING ORACLE_CORE...</p>
                <div id="chart-container" class="mb-6 bg-white border border-[#eee] p-2 hidden">
                    <canvas id="expensesChart"></canvas>
                </div>
                <p class="text-green-700 font-bold">> AUTHENTICATION SUCCESSFUL.</p>
                <p class="text-zinc-500">> СИСТЕМА ГОТОВА К РАБОТЕ.</p>
            </div>
            
            <div class="h-14 bg-[#e8e8e8] border border-[#ccc] flex items-center px-4 md:px-6 gap-3 md:gap-4 mt-4">
                <span class="text-[#314358] font-bold text-lg">></span>
                <input type="text" id="cmd-input" placeholder="WAITING_FOR_COMMAND..." class="flex-1 bg-white border border-[#bbb] px-4 py-2 outline-none text-[#333] font-mono text-sm uppercase placeholder-zinc-400" autofocus autocomplete="off">
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
