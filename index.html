<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE TERMINAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0c0c0c] text-[#EBEAE8] font-mono overflow-hidden h-screen">
    <div class="scanline"></div>

    <div class="flex h-full p-4 md:p-6 gap-6 max-w-[1400px] mx-auto relative z-20">
        <aside id="sidebar" class="hidden md:flex flex-col w-64 border-r border-zinc-900 pr-6 py-4">
            <div class="italic text-[10px] tracking-[0.3em] text-zinc-600 mb-8 uppercase">SYSTEM_ACCESS_V1.0</div>
            <nav class="space-y-2">
                <div class="group"><span>▶</span> STATUS</div>
                <div class="group"><span>▶</span> SCAN</div>
                <div class="group"><span>▶</span> DATABASES</div>
                <div class="group"><span>▶</span> SHOW</div>
                <div class="group"><span>▶</span> STATS</div>
                <div class="group"><span>▶</span> TOTAL</div>
                <div class="group"><span>▶</span> CLEAR</div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col min-w-0 bg-black/40 border border-zinc-900 rounded-lg p-4 shadow-2xl">
            <div class="mobile-menu md:hidden flex flex-wrap gap-2 mb-4 border-b border-zinc-900 pb-4">
                <button class="bg-zinc-900 px-3 py-1 rounded text-xs">STATUS</button>
                <button class="bg-zinc-900 px-3 py-1 rounded text-xs">SHOW</button>
                <button class="bg-zinc-900 px-3 py-1 rounded text-xs text-red-600">STATS</button>
                <button class="bg-zinc-900 px-3 py-1 rounded text-xs">TOTAL</button>
            </div>

            <div id="terminal-out" class="flex-1 overflow-y-auto space-y-2 mb-4 pr-2 custom-scroll text-sm md:text-base">
                <div class="text-zinc-500 italic">> STANDBY... WAITING FOR CORE_INITIALIZATION...</div>
            </div>

            <div id="chart-container" class="hidden h-48 md:h-64 mb-4 border-t border-zinc-900 pt-4">
                <canvas id="expensesChart"></canvas>
            </div>

            <div class="flex items-center gap-3 border-t border-zinc-900 pt-4">
                <span class="text-[#F80000] font-bold animate-pulse">SYS@ORACLE:~$</span>
                <input id="cmd-input" type="text" autocomplete="off" autofocus
                    class="bg-transparent border-none outline-none flex-1 text-white placeholder-zinc-800"
                    placeholder="ENTER COMMAND...">
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="app.js"></script>
</body>
</html>
