<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ORACLE DATA CONTROL</title>
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="h-screen flex flex-col overflow-hidden bg-black">
    
    <header class="h-14 bg-[#111] border-b-2 border-[#F80000] flex items-center justify-between px-4 md:px-8 z-50">
        <div class="flex items-center gap-4 md:gap-6">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/50/Oracle_logo.svg" 
                 alt="ORACLE" 
                 style="filter: invert(12%) sepia(94%) saturate(7465%) hue-rotate(358deg) brightness(96%) contrast(118%);" 
                 class="h-5">
            
            <div class="h-6 w-[1px] bg-[#3A3530]"></div>
            <h1 class="text-[#EBEAE8] text-[10px] md:text-[12px] tracking-[0.3em] font-light uppercase opacity-60">Data Control System</h1>
        </div>
        <div class="hidden md:flex items-center gap-6">
            <div class="flex flex-col items-end">
                <span class="text-[9px] text-zinc-500 uppercase tracking-widest">Operator</span>
                <span class="text-[11px] text-[#F80000] font-bold">TONI_STARK</span>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden relative">
        <aside class="hidden lg:flex w-64 border-r border-[#F80000] flex-col p-6 gap-8 bg-[#050505] z-40">
            <div class="space-y-6">
                <div class="italic text-[#F80000] font-bold">MAIN_OPERATIONS</div>
                <nav class="space-y-2">
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> SCAN</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> STATUS</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> DATABASES</div>
                </nav>
            </div>
            <div class="space-y-6">
                <div class="italic text-[#F80000] font-bold">ANALYTICS</div>
                <nav class="space-y-2">
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> SHOW</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> STATS</div>
                    <div class="group cursor-pointer hover:text-white transition-all"><span>▶</span> TOTAL</div>
                </nav>
            </div>
        </aside>

        <section class="flex-1 flex flex-col p-4 md:p-8 relative min-w-0 bg-black">
            <div class="lg:hidden flex gap-2 mb-4 overflow-x-auto pb-2 no-scrollbar">
                <button class="bg-[#111] border border-[#F80000] text-zinc-400 px-3 py-2 text-[10px] uppercase hover:text-white">Scan</button>
                <button class="bg-[#111] border border-[#F80000] text-zinc-400 px-3 py-2 text-[10px] uppercase hover:text-white">Stats</button>
                <button class="bg-[#111] border border-[#F80000] text-zinc-400 px-3 py-2 text-[10px] uppercase hover:text-white">Clear</button>
            </div>

            <div id="terminal-out" class="flex-1 bg-black border border-[#F80000] p-4 md:p-6 mono text-[12px] md:text-[13px] text-white overflow-y-auto relative shadow-[0_0_15px_rgba(248,0,0,0.1)]">
                <div class="scanline"></div>
                <p class="text-zinc-600 mb-4 tracking-widest text-[9px] md:text-[10px]">>>> INITIALIZING ORACLE_CORE...</p>
                
                <div id="chart-container" class="mb-6 bg-[#0a0a0a] border border-zinc-900 p-2 hidden">
                    <canvas id="expensesChart"></canvas>
                </div>

                <p class="text-red-600 font-bold">> AUTHENTICATION SUCCESSFUL.</p>
                <p class="text-zinc-400">> СИСТЕМА ГОТОВА К РАБОТЕ.</p>
            </div>
            
            <div class="h-14 bg-black border-2 border-[#F80000] flex items-center px-4 md:px-6 gap-3 md:gap-4 shadow-[0_0_20px_rgba(248,0,0,0.15)] mt-4">
                <span class="text-red-600 font-bold text-lg animate-pulse">></span>
                <input type="text" id="cmd-input" placeholder="WAITING_FOR_COMMAND..." class="flex-1 bg-transparent border-none outline-none text-white font-mono text-sm md:text-base placeholder-zinc-900 uppercase" autofocus autocomplete="off">
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
